<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bde7ff"/>
      <stop offset="100%" stop-color="#7fd4ff"/>
    </linearGradient>
    <radialGradient id="balloon-pink" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffb8d6"/>
      <stop offset="75%" stop-color="#ff6fa5"/>
      <stop offset="100%" stop-color="#e03a7a"/>
    </radialGradient>
    <radialGradient id="balloon-purple" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#cbb8ff"/>
      <stop offset="75%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- fundo arredondado com degradê céu -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- nuvenzinhas decorativas -->
  <g opacity="0.55">
    <circle cx="80"  cy="100" r="26" fill="#ffffff"/>
    <circle cx="110" cy="90"  r="34" fill="#ffffff"/>
    <circle cx="142" cy="102" r="24" fill="#ffffff"/>
    <circle cx="430" cy="420" r="22" fill="#ffffff"/>
    <circle cx="450" cy="412" r="28" fill="#ffffff"/>
  </g>

  <!-- balão roxo atrás (menor) -->
  <g transform="translate(320 80) rotate(8)" filter="url(#shadow)">
    <path d="M70 10 C32 10 8 48 8 96 C8 144 40 176 60 184 L60 196 L80 196 L80 184 C100 176 132 144 132 96 C132 48 108 10 70 10Z"
          fill="url(#balloon-purple)"/>
    <path d="M60 196 L80 196 L76 212 L64 212 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M70 212 Q55 240 80 260" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.65"/>
    <text x="70" y="130" text-anchor="middle" font-family="Fredoka, 'Arial Rounded MT Bold', Arial, sans-serif"
          font-weight="700" font-size="78" fill="#fff">i</text>
  </g>

  <!-- balão rosa principal (maior, centralizado-esquerdo) -->
  <g transform="translate(88 128)" filter="url(#shadow)">
    <path d="M110 0 C50 0 8 60 8 132 C8 210 60 260 92 270 L92 286 L128 286 L128 270 C160 260 212 210 212 132 C212 60 170 0 110 0Z"
          fill="url(#balloon-pink)"/>
    <!-- brilho -->
    <ellipse cx="75" cy="70" rx="22" ry="36" fill="rgba(255,255,255,0.4)"/>
    <!-- nó -->
    <path d="M92 286 L128 286 L122 308 L98 308 Z" fill="rgba(0,0,0,0.22)"/>
    <!-- barbante -->
    <path d="M110 308 Q80 340 120 370" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7"/>
    <!-- letra A -->
    <text x="110" y="190" text-anchor="middle" font-family="Fredoka, 'Arial Rounded MT Bold', Arial, sans-serif"
          font-weight="700" font-size="150" fill="#fff">A</text>
  </g>

  <!-- faixa de grama inferior -->
  <path d="M0 440 Q128 420 256 440 T512 440 L512 512 L0 512 Z" fill="#7ed957"/>
  <path d="M0 460 Q128 445 256 460 T512 460 L512 512 L0 512 Z" fill="#5ca94a"/>
</svg>
